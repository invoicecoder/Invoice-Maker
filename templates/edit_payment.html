<!DOCTYPE html>
<html>

<head>
<title>Edit Payment</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

form{
background:white;
padding:30px;
border-radius:8px;
width:400px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:5px;
}

button{
padding:10px 20px;
background:#2470ff;
color:white;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<h2>Edit Payment</h2>

<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<label>Date</label>
<input type="date" name="payment_date" value="{{ payment.date }}">

<label>Amount</label>
<input type="number" step="0.01" name="amount" value="{{ payment.amount }}">

<label>Description</label>
<textarea name="description">{{ payment.description }}</textarea>

<button type="submit">Update Payment</button>

</form>

</body>
</html>
